
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>

 
body{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
       "Segoe UI Symbol";
    
}
  h1 {
    font-size:xx-large;
    font-weight: bold;
    line-height: 100%;
    letter-spacing: -0.125rem;
    margin: 0;
    font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
  }


  nav {
    max-width: 100%;
    min-height: fit-content;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    padding: 15px;
    background-color: rgb(255, 111, 154);
  }

  .content {
    display: flex;
    width: 100%;
    max-width: 700px;
    margin-bottom: 0rem;
    color: aliceblue;
    text-shadow: -1px 1px 1px black;
  }

.left-side p{
color: aliceblue;
text-shadow: -1px 1px 1px black;
font-weight: bold;
}
.saludo{
color: rgb(124, 0, 72);
text-shadow: -1px 1px 1px rgb(255, 255, 255), -1px 1px 1px rgb(255, 255, 255);
font-weight: bold;

}
.componentes{
position: relative;
display: flex;
justify-content: center;
justify-self: center;
min-height: fit-content;
max-height: max-content;
gap: 20px;
background-color: rgba(67, 3, 110, 0.541);
border-radius: 18px;
padding: 15px;
margin-top: 10px;
margin-bottom: 10%;




}
  @media screen and (max-width: 650px) {
    .content {
      flex-direction: column;
      width: max-content;
    }

  }
</style>
</head>
<body>
  
  <nav class="main">
    <div class="content">
      <div class="left-side">
        <h1>Hello, {{ title() }}</h1>
        <p>¡Estas En Linea! 🎉</p> <br>
      </div>
    </div>
    <h2 class="saludo">{{saludo}}</h2>
  </nav>
  
  <div class="componentes">
    <app-empleados></app-empleados>
    <!-- <app-empleado></app-empleado>
    <app-empleado></app-empleado>
    <app-empleado></app-empleado> -->
  
  </div>

<router-outlet></router-outlet>
</body>
</html>
